<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>행운권 당첨 이벤트</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(135deg, #fff7e6, #ffe4ec);
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 860px;
      text-align: center;
    }

    .title {
      font-size: 34px;
      margin: 0 0 10px;
      font-weight: 900;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 17px;
      color: #555;
      line-height: 1.5;
    }

    .notice {
      display: inline-block;
      background: #fff;
      border: 2px solid #ffb703;
      border-radius: 999px;
      padding: 10px 18px;
      margin-bottom: 22px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1.18;
      border: none;
      background: transparent;
      perspective: 900px;
      cursor: pointer;
      padding: 0;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.7s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      overflow: hidden;
    }

    .card-front {
      background: linear-gradient(145deg, #e63946, #ff7b00);
      color: white;
      border: 3px solid rgba(255, 255, 255, 0.65);
    }

    .card-front .gift {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .card-front .text {
      font-size: 16px;
      font-weight: 900;
    }

    .card-back {
      transform: rotateY(180deg);
      background: white;
      border: 3px solid #ffb703;
      color: #111;
      padding: 8px;
    }

    .rank {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .msg {
      font-size: 14px;
      font-weight: 700;
      color: #555;
    }

    .first {
      background: linear-gradient(145deg, #fff4bd, #ffffff);
      border-color: #f4b400;
    }

    .second {
      background: linear-gradient(145deg, #e9f5ff, #ffffff);
      border-color: #5aa9e6;
    }

    .third {
      background: linear-gradient(145deg, #f1fff0, #ffffff);
      border-color: #70c36b;
    }

    .result-box {
      margin-top: 22px;
      min-height: 34px;
      font-size: 22px;
      font-weight: 900;
      color: #d62828;
    }

    .card.disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 27px;
      }

      .grid {
        gap: 9px;
      }

      .card-front .gift {
        font-size: 26px;
      }

      .card-front .text,
      .msg {
        font-size: 12px;
      }

      .rank {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">행운권 당첨 이벤트</h1>
    <p class="subtitle">마음에 드는 카드를 한 장 선택해 뒤집어 주세요.</p>
    <div class="notice">1등 5% · 2등 20% · 3등 75%</div>

    <section class="grid" id="cardGrid" aria-label="행운권 카드 25개"></section>

    <div class="result-box" id="resultBox"></div>
  </main>

  <script>
    const cardGrid = document.getElementById("cardGrid");
    const resultBox = document.getElementById("resultBox");
    const totalCards = 25;
    let picked = false;

    function drawPrize() {
      const random = Math.random() * 100;

      if (random < 5) {
        return {
          rank: "1등",
          message: "축하합니다! 최고의 행운입니다 🎉",
          className: "first"
        };
      }

      if (random < 25) {
        return {
          rank: "2등",
          message: "축하합니다! 좋은 행운입니다 🎁",
          className: "second"
        };
      }

      return {
        rank: "3등",
        message: "축하합니다! 행운 당첨입니다 🍀",
        className: "third"
      };
    }

    function createCards() {
      for (let i = 1; i <= totalCards; i++) {
        const card = document.createElement("button");
        card.className = "card";
        card.type = "button";
        card.setAttribute("aria-label", i + "번 행운권 카드");

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <div class="gift">🎁</div>
              <div class="text">LUCKY CARD</div>
            </div>
            <div class="card-back">
              <div class="rank">?</div>
              <div class="msg">카드를 선택해 주세요</div>
            </div>
          </div>
        `;

        card.addEventListener("click", () => {
          if (picked) return;

          picked = true;
          const prize = drawPrize();
          const back = card.querySelector(".card-back");
          const rank = card.querySelector(".rank");
          const msg = card.querySelector(".msg");

          rank.textContent = prize.rank;
          msg.textContent = prize.message;
          back.classList.add(prize.className);
          card.classList.add("flipped");

          resultBox.textContent = `${prize.rank} 당첨! 축하드립니다.`;

          document.querySelectorAll(".card").forEach((otherCard) => {
            if (otherCard !== card) {
              otherCard.classList.add("disabled");
            }
          });
        });

        cardGrid.appendChild(card);
      }
    }

    createCards();
  </script>
</body>
</html>
