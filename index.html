<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환자경험평가 행운권 이벤트</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(135deg, #f7f9fc, #eaf4ff);
      color: #222;
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
    }

    .title {
      font-size: 34px;
      margin: 0 0 10px;
      font-weight: 900;
      color: #173b6c;
    }

    .subtitle {
      margin: 0 0 18px;
      font-size: 17px;
      color: #555;
      line-height: 1.5;
    }

    .notice {
      display: inline-block;
      background: #fff;
      border: 2px solid #2d6cdf;
      color: #173b6c;
      border-radius: 999px;
      padding: 10px 18px;
      margin-bottom: 16px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .status-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 auto 22px;
      font-size: 14px;
      color: #444;
    }

    .status-item {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #d7e5ff;
      border-radius: 999px;
      padding: 8px 13px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }

    .card {
      position: relative;
      aspect-ratio: 1 / 1.32;
      border: none;
      background: transparent;
      perspective: 1000px;
      cursor: pointer;
      padding: 0;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.7s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      overflow: hidden;
      padding: 10px;
    }

    .card-front {
      background: linear-gradient(145deg, #ffffff, #eef5ff);
      border: 3px solid #b7d0ff;
      color: #173b6c;
    }

    .card-back {
      transform: rotateY(180deg);
      background: white;
      border: 3px solid #ffb703;
      color: #111;
      padding: 8px;
    }

    .front-photo {
      width: 100%;
      height: 64%;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 2px solid #d5e4ff;
      background: #f2f2f2;
    }

    .front-title {
      font-size: 13px;
      font-weight: 900;
      color: #173b6c;
      margin-bottom: 4px;
      line-height: 1.2;
      word-break: keep-all;
    }

    .front-text {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.3;
      text-align: center;
      color: #173b6c;
      word-break: keep-all;
    }

    .rank {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .msg {
      font-size: 14px;
      font-weight: 700;
      color: #555;
      text-align: center;
      line-height: 1.35;
      word-break: keep-all;
    }

    .first {
      background: linear-gradient(145deg, #fff4bd, #ffffff);
      border-color: #f4b400;
    }

    .second {
      background: linear-gradient(145deg, #e9f5ff, #ffffff);
      border-color: #5aa9e6;
    }

    .third {
      background: linear-gradient(145deg, #f1fff0, #ffffff);
      border-color: #70c36b;
    }

    .result-box {
      margin-top: 22px;
      min-height: 34px;
      font-size: 24px;
      font-weight: 900;
      color: #d62828;
    }

    .button-box {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .next-btn,
    .reset-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .next-btn {
      background: #173b6c;
      display: none;
    }

    .reset-btn {
      background: #888;
    }

    .card.disabled {
      cursor: not-allowed;
      opacity: 0.35;
    }

    .end-message {
      margin-top: 30px;
      padding: 30px;
      background: white;
      border-radius: 18px;
      border: 3px solid #173b6c;
      font-size: 24px;
      font-weight: 900;
      color: #173b6c;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .grid {
        gap: 8px;
      }

      .front-photo {
        height: 60%;
      }

      .front-title {
        font-size: 10px;
      }

      .front-text {
        font-size: 10px;
      }

      .rank {
        font-size: 24px;
      }

      .msg {
        font-size: 12px;
      }

      .status-box {
        font-size: 12px;
      }

      .status-item {
        padding: 7px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">환자경험평가 행운권 이벤트</h1>
    <p class="subtitle">카드를 한 장 선택하면 당첨 결과가 공개됩니다.</p>

    <div class="notice">총 1,000명 대상 · 1등 5% · 2등 20% · 3등 75%</div>

    <div class="status-box" id="statusBox"></div>

    <section class="grid" id="cardGrid" aria-label="행운권 카드 25개"></section>

    <div class="result-box" id="resultBox"></div>

    <div class="button-box">
      <button class="next-btn" id="nextBtn">다음 참가자</button>
      <button class="reset-btn" id="resetBtn">처음부터 다시 시작</button>
    </div>
  </main>

  <script>
    const cardGrid = document.getElementById("cardGrid");
    const resultBox = document.getElementById("resultBox");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusBox = document.getElementById("statusBox");

    const totalCards = 25;
    let picked = false;

    const initialPrizePool = {
      first: 50,
      second: 200,
      third: 750
    };

    const officials = [
      {
        title: "병원장",
        image: "director.png.jpg"
      },
      {
        title: "간호부장",
        image: "nursing.png"
      },
      {
        title: "경영관리실장",
        image: "management.png"
      },
      {
        title: "진료부원장",
        image: "medical.png"
      },
      {
        title: "연구부원장",
        image: "research.png"
      },
      {
        title: "진료협력센터장",
        image: "cooperation.png"
      }
    ];

    function getRandomOfficial() {
      const randomIndex = Math.floor(Math.random() * officials.length);
      return officials[randomIndex];
    }

    function loadPrizePool() {
      const saved = localStorage.getItem("patientExperiencePrizePool");

      if (saved) {
        return JSON.parse(saved);
      }

      localStorage.setItem("patientExperiencePrizePool", JSON.stringify(initialPrizePool));
      return { ...initialPrizePool };
    }

    function savePrizePool(pool) {
      localStorage.setItem("patientExperiencePrizePool", JSON.stringify(pool));
    }

    function getTotalRemaining(pool) {
      return pool.first + pool.second + pool.third;
    }

    function updateStatus() {
      const pool = loadPrizePool();
      const totalRemaining = getTotalRemaining(pool);
      const used = 1000 - totalRemaining;

      statusBox.innerHTML = `
        <div class="status-item">진행 ${used} / 1000명</div>
        <div class="status-item">1등 남음 ${pool.first}명</div>
        <div class="status-item">2등 남음 ${pool.second}명</div>
        <div class="status-item">3등 남음 ${pool.third}명</div>
      `;
    }

    function drawPrize() {
      const pool = loadPrizePool();
      const totalRemaining = getTotalRemaining(pool);

      if (totalRemaining <= 0) {
        return {
          rank: "종료",
          message: "모든 행운권 추첨이 종료되었습니다.",
          className: "third"
        };
      }

      const random = Math.floor(Math.random() * totalRemaining) + 1;

      if (random <= pool.first) {
        pool.first -= 1;
        savePrizePool(pool);

        return {
          rank: "1등",
          message: "축하합니다! 1등 당첨입니다 🎉",
          className: "first"
        };
      }

      if (random <= pool.first + pool.second) {
        pool.second -= 1;
        savePrizePool(pool);

        return {
          rank: "2등",
          message: "축하합니다! 2등 당첨입니다 🎁",
          className: "second"
        };
      }

      pool.third -= 1;
      savePrizePool(pool);

      return {
        rank: "3등",
        message: "축하합니다! 3등 당첨입니다 🍀",
        className: "third"
      };
    }

    function createCards() {
      cardGrid.innerHTML = "";

      const pool = loadPrizePool();
      const totalRemaining = getTotalRemaining(pool);

      if (totalRemaining <= 0) {
        cardGrid.innerHTML = `
          <div class="end-message" style="grid-column: 1 / -1;">
            모든 행운권 추첨이 종료되었습니다.
          </div>
        `;
        resultBox.textContent = "";
        nextBtn.style.display = "none";
        updateStatus();
        return;
      }

      for (let i = 1; i <= totalCards; i++) {
        const card = document.createElement("button");
        const official = getRandomOfficial();

        card.className = "card";
        card.type = "button";
        card.setAttribute("aria-label", i + "번 행운권 카드");

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">
              <img src="${official.image}" alt="${official.title} 사진" class="front-photo">
              <div class="front-title">${official.title}</div>
              <div class="front-text">환자경험평가 화이팅</div>
            </div>
            <div class="card-back">
              <div class="rank">?</div>
              <div class="msg">카드를 선택해 주세요</div>
            </div>
          </div>
        `;

        card.addEventListener("click", () => {
          if (picked) return;

          picked = true;

          const prize = drawPrize();
          const back = card.querySelector(".card-back");
          const rank = card.querySelector(".rank");
          const msg = card.querySelector(".msg");

          rank.textContent = prize.rank;
          msg.textContent = prize.message;
          back.classList.add(prize.className);
          card.classList.add("flipped");

          if (prize.rank === "종료") {
            resultBox.textContent = "행운권 추첨이 종료되었습니다.";
          } else {
            resultBox.textContent = `${prize.rank} 당첨! 축하드립니다.`;
          }

          document.querySelectorAll(".card").forEach((otherCard) => {
            if (otherCard !== card) {
              otherCard.classList.add("disabled");
            }
          });

          nextBtn.style.display = "inline-block";
          updateStatus();
        });

        cardGrid.appendChild(card);
      }

      updateStatus();
    }

    nextBtn.addEventListener("click", () => {
      picked = false;
      resultBox.textContent = "";
      nextBtn.style.display = "none";
      createCards();
    });

    resetBtn.addEventListener("click", () => {
      const firstConfirm = confirm("정말 처음부터 다시 시작할까요? 모든 당첨 기록이 초기화됩니다.");

      if (!firstConfirm) return;

      const secondConfirm = confirm("행사 중에는 누르면 안 됩니다. 그래도 초기화할까요?");

      if (!secondConfirm) return;

      localStorage.removeItem("patientExperiencePrizePool");
      picked = false;
      resultBox.textContent = "";
      nextBtn.style.display = "none";
      createCards();
    });

    createCards();
  </script>
</body>
</html>
